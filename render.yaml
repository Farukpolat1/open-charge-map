databases:
 - name: mysite
   databaseName: mysite
   user: mysite
   plan: free

services:
 - type: web
   name: mysite
   runtime: ruby
   plan: free
   buildCommand: "./bin/render-builder.sh"
   # preDeployCommnd: "bundle exec rails db:migrate" # preDeployCommand only available on paid instance types
   startCommand: "bundle exec rails server"
   envVars:
    - key: DATABASE_URL
      fromDatabase:
        name: mysite
        property: connectionString
    - key: RAILS_MASTER_KEY
      sync: false
    - key: WEB_CONCURRENCY
      value: 2 # sensible default
    - key: SOLID_QUEUE_IN_PUMA
      value: true # arka plan job'larını (OCM senkronu, mail gönderimi) Puma içinde çalıştır